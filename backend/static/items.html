<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상품 목록</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <a href="/">홈</a>
    <a href="/items">상품 목록</a>
    <a href="/dashboard">대시보드</a>
  </nav>
  <h2>상품 목록</h2>
  <p>이 페이지에서 판매글을 등록하면, 등록 즉시 목록에 반영됩니다.</p>

  <h3>판매글 등록</h3>
  <form id="create-item-form">
    <input name="title" placeholder="상품명" required>
    <textarea name="description" placeholder="설명"></textarea>
    <input name="price" type="number" placeholder="가격" required>
    <button type="submit">등록하기</button>
  </form>

  <h3>현재 판매 목록</h3>
  <div id="item-list">불러오는 중...</div>

  <p><a href="/">홈으로</a></p>

  <script>
    async function loadItems() {
      const res = await fetch('/api/items');
      const data = await res.json();
      const container = document.getElementById('item-list');
      if (!data.items || !data.items.length) {
        container.innerHTML = '<p>등록된 상품이 없습니다.</p>';
        return;
      }
      container.innerHTML = data.items.map(item => `
        <div class="card">
          <a href="/items/${item.id}" style="display:block;margin-bottom:0.75rem">
            <div style="width:100%;height:120px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;border-radius:8px">상품 이미지</div>
          </a>
          <a href="/items/${item.id}">${item.title}</a> - ${item.price.toLocaleString()}원
        </div>
      `).join('');
    }

    document.getElementById('create-item-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const csrfRes = await fetch('/api/auth/csrf-token');
      const csrfData = await csrfRes.json().catch(() => ({}));
      const form = event.target;
      const formData = new FormData(form);
      const res = await fetch('/api/items', {
        method: 'POST',
        body: formData,
        credentials: 'same-origin',
        headers: {
          'X-CSRFToken': csrfData.csrf_token || ''
        }
      });
      if (res.ok) {
        form.reset();
        await loadItems();
      } else {
        alert('판매글 등록에 실패했습니다.');
      }
    });

    loadItems();
  </script>
</body>
</html>
