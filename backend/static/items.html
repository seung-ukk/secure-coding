<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>상품 목록</title>
  <style>body{font-family:Arial,sans-serif;max-width:900px;margin:2rem auto;padding:1rem} .card{border:1px solid #ddd;padding:1rem;margin:1rem 0} form input, form textarea, form button{display:block;width:100%;margin:0.5rem 0;padding:0.6rem}</style>
</head>
<body>
  <h2>상품 목록</h2>
  <p>이 페이지에서 판매글을 등록하면, 등록 즉시 목록에 반영됩니다.</p>

  <h3>판매글 등록</h3>
  <form id="create-item-form">
    <input name="title" placeholder="상품명" required>
    <textarea name="description" placeholder="설명"></textarea>
    <input name="price" type="number" placeholder="가격" required>
    <button type="submit">등록하기</button>
  </form>

  <h3>현재 판매 목록</h3>
  <div id="item-list">불러오는 중...</div>

  <p><a href="/">홈으로</a></p>

  <script>
    async function loadItems() {
      const res = await fetch('/api/items');
      const data = await res.json();
      const container = document.getElementById('item-list');
      if (!data.items || !data.items.length) {
        container.innerHTML = '<p>등록된 상품이 없습니다.</p>';
        return;
      }
      container.innerHTML = data.items.map(item => `<div class="card"><a href="/items/${item.id}">${item.title}</a> - ${item.price.toLocaleString()}원</div>`).join('');
    }

    document.getElementById('create-item-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      const form = event.target;
      const formData = new FormData(form);
      const res = await fetch('/api/items', {
        method: 'POST',
        body: formData,
        credentials: 'same-origin'
      });
      if (res.ok) {
        form.reset();
        await loadItems();
      } else {
        alert('판매글 등록에 실패했습니다.');
      }
    });

    loadItems();
  </script>
</body>
</html>
