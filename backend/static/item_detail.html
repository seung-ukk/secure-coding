<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>상품 상세</title>
  <style>body{font-family:Arial,sans-serif;max-width:900px;margin:2rem auto;padding:1rem} .card{border:1px solid #ddd;padding:1rem;margin:1rem 0;border-radius:8px} button{padding:0.6rem 1rem;margin-top:0.5rem} .message{margin:1rem 0;padding:0.75rem;border-radius:4px}.error{background:#ffeaea;color:#b00020}.success{background:#eaf7ea;color:#1b5e20}</style>
</head>
<body>
  <h2>상품 상세</h2>
  <div id="item-detail">불러오는 중...</div>
  <div id="message-box"></div>
  <div id="chat-section" style="display:none">
    <h3>거래 채팅</h3>
    <div id="chat-messages"></div>
    <form id="chat-form">
      <textarea id="chat-content" rows="3" placeholder="메시지를 입력하세요" required></textarea>
      <button type="submit">메시지 보내기</button>
    </form>
  </div>
  <p><a href="/items">목록으로</a></p>
  <script>
    const itemId = window.location.pathname.split('/').pop();
    let currentTransactionId = null;

    async function loadItem() {
      const res = await fetch(`/api/items/${itemId}`);
      const data = await res.json().catch(() => ({}));
      const container = document.getElementById('item-detail');
      if (!data.id) {
        container.innerHTML = '<p>상품을 찾을 수 없습니다.</p>';
        return;
      }
      container.innerHTML = `
        <div class="card">
          <h3>${data.title}</h3>
          <p>가격: ${Number(data.price).toLocaleString()}원</p>
          <p>설명: ${data.description || '설명 없음'}</p>
          <p>판매자: ${data.owner?.username || '알 수 없음'}</p>
          <button id="request-btn" type="button">구매 요청</button>
        </div>
      `;
      document.getElementById('request-btn').addEventListener('click', requestPurchase);
    }

    async function requestPurchase() {
      const res = await fetch(`/api/items/${itemId}/request`, { method: 'POST', credentials: 'same-origin' });
      const data = await res.json().catch(() => ({}));
      const box = document.getElementById('message-box');
      if (res.ok) {
        currentTransactionId = data.transaction_id;
        box.className = 'message success';
        box.textContent = '거래 요청이 생성되었습니다. 판매자와 채팅을 시작할 수 있습니다.';
        await loadMessages();
      } else {
        box.className = 'message error';
        box.textContent = data.message || '거래 요청에 실패했습니다.';
      }
    }

    async function loadMessages() {
      if (!currentTransactionId) return;
      const res = await fetch(`/api/transactions/${currentTransactionId}/messages`, { credentials: 'same-origin' });
      const data = await res.json().catch(() => ({ messages: [] }));
      const chatSection = document.getElementById('chat-section');
      const chatMessages = document.getElementById('chat-messages');
      chatSection.style.display = 'block';
      chatMessages.innerHTML = (data.messages || []).length
        ? data.messages.map(msg => `<div class="card">${msg.content}</div>`).join('')
        : '<p>아직 메시지가 없습니다.</p>';
    }

    document.getElementById('chat-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!currentTransactionId) return;
      const content = document.getElementById('chat-content').value.trim();
      if (!content) return;
      const res = await fetch(`/api/transactions/${currentTransactionId}/messages`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content })
      });
      if (res.ok) {
        document.getElementById('chat-content').value = '';
        await loadMessages();
      }
    });

    loadItem();
  </script>
</body>
</html>
