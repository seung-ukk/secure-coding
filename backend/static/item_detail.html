<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상품 상세 - TinyMarket</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <!-- Global Navigation Header -->
  <header id="global-header"></header>

  <!-- Container for Item Detail -->
  <div id="item-detail">
    <div class="card" style="text-align: center; color: var(--text-secondary);">상품 정보를 불러오는 중...</div>
  </div>

  <!-- Seller Transactions Section -->
  <div id="seller-section" style="display:none; margin-top: 2rem;">
    <h3>📩 이 상품에 접수된 구매 요청 목록</h3>
    <div id="seller-transactions-list"></div>
  </div>

  <div id="message-box" style="margin-top: 1rem;"></div>

  <!-- Chat Section -->
  <div id="chat-section" style="display:none; margin-top: 2rem;">
    <h3>💬 거래 1:1 채팅</h3>
    <div id="chat-messages"></div>
    <form id="chat-form" style="display: flex; gap: 0.5rem; margin-top: 0.75rem;">
      <textarea id="chat-content" rows="2" placeholder="메시지를 입력하세요..." required style="flex: 1; margin: 0;"></textarea>
      <button type="submit" style="padding: 0.75rem 1.5rem; white-space: nowrap;">전송</button>
    </form>
  </div>

  <!-- Report Modal -->
  <div id="report-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" style="color: var(--error);">🚨 상품 / 유저 신고하기</h3>
        <button id="close-report-modal-btn" class="modal-close" type="button">&times;</button>
      </div>
      <form id="report-form">
        <div style="margin-bottom: 1rem;">
          <label style="display:block; margin-bottom: 0.4rem; font-weight: 500;">신고 사유</label>
          <select id="report-reason-select" class="status-select-dropdown" style="width: 100%;">
            <option value="사기 의심">⚠️ 사기 의심 / 허위 정보</option>
            <option value="부적절한 내용">🔞 부적절한 게시글 / 금지 품목</option>
            <option value="욕설 및 비매너">🤬 욕설 / 비매너 언행</option>
            <option value="기타">기타 사유</option>
          </select>
        </div>
        <div style="margin-bottom: 1.5rem;">
          <label style="display:block; margin-bottom: 0.4rem; font-weight: 500;">상세 이유 작성</label>
          <textarea id="report-details-input" rows="4" placeholder="신고하는 구체적인 이유를 적어주시면 관리자가 검토 후 조치합니다." required></textarea>
        </div>
        <div style="display: flex; gap: 0.75rem; justify-content: flex-end;">
          <button id="cancel-report-btn" type="button" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);">취소</button>
          <button type="submit" class="btn-report">신고 제출하기</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Transfer Modal -->
  <div id="transfer-modal" class="modal-overlay">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title" style="color: var(--success);">💸 판매자에게 송금하기</h3>
        <button id="close-transfer-modal-btn" class="modal-close" type="button">&times;</button>
      </div>
      <form id="transfer-form">
        <div style="margin-bottom: 1rem;">
          <label style="display:block; margin-bottom: 0.4rem; font-weight: 500;">받는 판매자</label>
          <input type="text" id="transfer-to-user-display" readonly style="background: rgba(255,255,255,0.05); color: var(--text-secondary);">
        </div>
        <div style="margin-bottom: 1.5rem;">
          <label style="display:block; margin-bottom: 0.4rem; font-weight: 500;">송금 금액 (원)</label>
          <input type="number" id="transfer-amount-input" min="1" placeholder="예: 50000" required>
        </div>
        <div style="display: flex; gap: 0.75rem; justify-content: flex-end;">
          <button id="cancel-transfer-btn" type="button" style="background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary);">취소</button>
          <button type="submit" class="btn-transfer">송금하기</button>
        </div>
      </form>
    </div>
  </div>

  <p style="margin-top: 2rem;"><a href="/items">&larr; 상품 목록으로 돌아가기</a></p>

  <script>
    const itemId = window.location.pathname.split('/').pop();
    let currentTransactionId = null;
    let currentUserId = null;
    let isSeller = false;
    let itemOwnerId = null;
    let itemOwnerUsername = '';
    let pollInterval = null;

    async function checkAuth() {
      const authRes = await fetch('/api/auth/status', { credentials: 'same-origin' });
      const authData = await authRes.json().catch(() => ({}));
      if (authData.authenticated) {
        currentUserId = authData.user?.id;
      }
    }

    async function loadItem() {
      await checkAuth();

      const res = await fetch(`/api/items/${itemId}`);
      const data = await res.json().catch(() => ({}));
      const container = document.getElementById('item-detail');
      if (!data.id) {
        container.innerHTML = '<div class="card"><p>상품을 찾을 수 없습니다.</p></div>';
        return;
      }

      itemOwnerId = data.owner?.id;
      itemOwnerUsername = data.owner?.username || '알 수 없음';
      isSeller = (itemOwnerId === currentUserId);
      const images = data.images || [];

      // Gallery HTML
      let galleryHtml = '';
      if (images.length > 0) {
        galleryHtml = `
          <div class="gallery-container">
            <div class="gallery-main-view">
              <img id="main-gallery-img" src="${escapeAttr(images[0])}" class="gallery-main-img" alt="${escapeAttr(data.title)}">
            </div>
            ${images.length > 1 ? `
              <div class="gallery-thumbs-list">
                ${images.map((imgUrl, idx) => `
                  <img src="${escapeAttr(imgUrl)}" class="gallery-thumb-item ${idx === 0 ? 'active' : ''}" data-img-url="${escapeAttr(imgUrl)}" alt="thumbnail">
                `).join('')}
              </div>
            ` : ''}
          </div>
        `;
      } else {
        galleryHtml = `
          <div class="gallery-container">
            <div class="gallery-main-view" style="font-size: 4rem; color: var(--text-secondary);">
              📦
            </div>
          </div>
        `;
      }

      // Info Panel HTML
      const infoHtml = `
        <div class="info-panel">
          <div class="info-header-row">
            <h1 class="info-title">${escapeHtml(data.title)}</h1>
            <div id="status-badge-container">${getStatusBadge(data.status || 'available')}</div>
          </div>
          <div class="info-price">${formatPrice(data.price)}</div>
          
          <div class="seller-badge-info" style="justify-content: space-between;">
            <span>👤 판매자: <strong>${escapeHtml(itemOwnerUsername)}</strong></span>
            <button id="open-report-btn" class="btn-report" type="button" style="padding: 0.3rem 0.75rem; font-size: 0.85rem;">🚨 신고</button>
          </div>

          <div style="background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); border-radius: 8px; padding: 1rem; margin: 0.5rem 0;">
            <strong style="display:block; margin-bottom: 0.5rem; color: var(--text-secondary);">상품 설명</strong>
            <p style="white-space: pre-wrap; margin: 0;">${escapeHtml(data.description || '설명이 작성되지 않았습니다.')}</p>
          </div>

          ${isSeller ? `
            <div class="seller-status-control">
              <span style="font-weight: 600;">🔄 거래 상태 변경</span>
              <select id="seller-status-select" class="status-select-dropdown">
                <option value="available" ${data.status === 'available' ? 'selected' : ''}>판매중</option>
                <option value="reserved" ${data.status === 'reserved' ? 'selected' : ''}>예약중</option>
                <option value="sold" ${data.status === 'sold' ? 'selected' : ''}>판매완료</option>
              </select>
            </div>
          ` : `
            <div style="display: flex; gap: 0.75rem; flex-wrap: wrap;">
              <button id="request-btn" type="button" style="padding: 0.9rem; font-size: 1rem; flex: 1;">
                🤝 구매 요청 & 채팅
              </button>
              <button id="open-transfer-btn" type="button" class="btn-transfer" style="padding: 0.9rem 1.25rem; font-size: 1rem;">
                💸 송금하기
              </button>
            </div>
          `}
        </div>
      `;

      container.innerHTML = `
        <div class="item-detail-grid">
          ${galleryHtml}
          ${infoHtml}
        </div>
      `;

      // Event Listeners for Gallery
      const thumbs = container.querySelectorAll('.gallery-thumb-item');
      const mainImg = container.querySelector('#main-gallery-img');
      thumbs.forEach(thumb => {
        thumb.addEventListener('click', () => {
          thumbs.forEach(t => t.classList.remove('active'));
          thumb.classList.add('active');
          if (mainImg) mainImg.src = thumb.getAttribute('data-img-url');
        });
      });

      // Bind Modals
      document.getElementById('open-report-btn').addEventListener('click', openReportModal);
      const transferBtn = document.getElementById('open-transfer-btn');
      if (transferBtn) transferBtn.addEventListener('click', openTransferModal);

      // Seller Status Change
      if (isSeller) {
        document.getElementById('seller-section').style.display = 'block';
        const statusSelect = document.getElementById('seller-status-select');
        if (statusSelect) {
          statusSelect.addEventListener('change', async (e) => {
            const newStatus = e.target.value;
            const csrfToken = await getCsrfToken();
            const patchRes = await fetch(`/api/items/${itemId}`, {
              method: 'PATCH',
              credentials: 'same-origin',
              headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': csrfToken
              },
              body: JSON.stringify({ status: newStatus })
            });

            if (patchRes.ok) {
              const badgeBox = document.getElementById('status-badge-container');
              if (badgeBox) badgeBox.innerHTML = getStatusBadge(newStatus);
            } else {
              alert('상태 변경에 실패했습니다.');
            }
          });
        }
        await loadSellerTransactions();
      } else {
        const reqBtn = document.getElementById('request-btn');
        if (reqBtn) {
          reqBtn.addEventListener('click', requestPurchase);
        }
        await checkExistingPurchaseRequest();
      }
    }

    // Report Modal Handling
    const reportModal = document.getElementById('report-modal');
    function openReportModal() {
      if (!currentUserId) {
        alert('신고하려면 먼저 로그인해주세요.');
        window.location.href = '/login';
        return;
      }
      reportModal.classList.add('active');
    }
    function closeReportModal() {
      reportModal.classList.remove('active');
      document.getElementById('report-form').reset();
    }
    document.getElementById('close-report-modal-btn').addEventListener('click', closeReportModal);
    document.getElementById('cancel-report-btn').addEventListener('click', closeReportModal);

    document.getElementById('report-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const reason = document.getElementById('report-reason-select').value;
      const details = document.getElementById('report-details-input').value.trim();
      const csrfToken = await getCsrfToken();

      try {
        const res = await fetch('/api/reports', {
          method: 'POST',
          credentials: 'same-origin',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
          },
          body: JSON.stringify({
            target_type: 'item',
            target_id: itemId,
            reason: reason,
            details: details
          })
        });

        if (res.ok) {
          alert('신고가 접수되었습니다. 관리자 검토 후 조치될 예정입니다.');
          closeReportModal();
        } else {
          alert('신고 접수에 실패했습니다.');
        }
      } catch (err) {
        alert('서버 통신 오류가 발생했습니다.');
      }
    });

    // Transfer Modal Handling
    const transferModal = document.getElementById('transfer-modal');
    function openTransferModal() {
      if (!currentUserId) {
        alert('송금하려면 먼저 로그인해주세요.');
        window.location.href = '/login';
        return;
      }
      document.getElementById('transfer-to-user-display').value = `${itemOwnerUsername} (User #${itemOwnerId})`;
      transferModal.classList.add('active');
    }
    function closeTransferModal() {
      transferModal.classList.remove('active');
      document.getElementById('transfer-form').reset();
    }
    document.getElementById('close-transfer-modal-btn').addEventListener('click', closeTransferModal);
    document.getElementById('cancel-transfer-btn').addEventListener('click', closeTransferModal);

    document.getElementById('transfer-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const amount = document.getElementById('transfer-amount-input').value;
      const csrfToken = await getCsrfToken();

      try {
        const res = await fetch('/api/payments/transfer', {
          method: 'POST',
          credentials: 'same-origin',
          headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': csrfToken
          },
          body: JSON.stringify({
            to_user_id: itemOwnerId,
            amount: parseFloat(amount)
          })
        });

        if (res.ok) {
          alert(`판매자 ${itemOwnerUsername}님에게 ${formatPrice(amount)} 송금이 성공적으로 완료되었습니다!`);
          closeTransferModal();
        } else {
          const errData = await res.json().catch(() => ({}));
          alert(errData.message || '송금에 실패했습니다.');
        }
      } catch (err) {
        alert('서버 통신 오류가 발생했습니다.');
      }
    });

    async function checkExistingPurchaseRequest() {
      if (!currentUserId) return;
      const res = await fetch('/api/transactions/mine', { credentials: 'same-origin' });
      const txData = await res.json().catch(() => ({ transactions: [] }));
      const myTx = (txData.transactions || []).find(tx => String(tx.item_id) === String(itemId) && tx.buyer_id === currentUserId);
      if (myTx) {
        currentTransactionId = myTx.id;
        const reqBtn = document.getElementById('request-btn');
        if (reqBtn) reqBtn.style.display = 'none';
        
        const box = document.getElementById('message-box');
        box.className = 'message success';
        box.textContent = '진행 중인 거래 요청이 있습니다. 아래에서 채팅을 이용하실 수 있습니다.';
        await loadMessages();
        startPolling();
      }
    }

    async function loadSellerTransactions() {
      const res = await fetch('/api/transactions/mine', { credentials: 'same-origin' });
      const data = await res.json().catch(() => ({ transactions: [] }));
      const listEl = document.getElementById('seller-transactions-list');
      const filtered = (data.transactions || []).filter(tx => String(tx.item_id) === String(itemId));

      if (filtered.length === 0) {
        listEl.innerHTML = '<div class="card"><p style="margin:0;">아직 접수된 구매 요청이 없습니다.</p></div>';
        return;
      }

      listEl.innerHTML = filtered.map(tx => `
        <div class="card clickable-tx" data-tx-id="${tx.id}" style="cursor: pointer; padding: 1rem; margin: 0.5rem 0; border: 1px solid var(--border-color); transition: var(--transition);">
          <strong>거래 #${tx.id}</strong> (상태: ${tx.status})<br>
          <small style="color: var(--accent-blue);">👉 클릭하여 구매자와 1:1 대화하기</small>
        </div>
      `).join('');

      const cards = listEl.querySelectorAll('.clickable-tx');
      cards.forEach(card => {
        card.addEventListener('click', async () => {
          cards.forEach(c => c.style.borderColor = 'var(--border-color)');
          card.style.borderColor = 'var(--accent-blue)';
          
          currentTransactionId = card.getAttribute('data-tx-id');
          await loadMessages();
          startPolling();
        });
      });
    }

    async function requestPurchase() {
      const authRes = await fetch('/api/auth/status', { credentials: 'same-origin' });
      const authData = await authRes.json().catch(() => ({}));
      if (!authData.authenticated) {
        alert('구매 요청을 하려면 먼저 로그인해주세요.');
        window.location.href = '/login';
        return;
      }

      const csrfToken = await getCsrfToken();
      const res = await fetch(`/api/items/${itemId}/request`, { 
        method: 'POST', 
        credentials: 'same-origin',
        headers: { 'X-CSRFToken': csrfToken }
      });
      const data = await res.json().catch(() => ({}));
      const box = document.getElementById('message-box');

      if (res.ok) {
        currentTransactionId = data.transaction_id;
        box.className = 'message success';
        box.textContent = '거래 요청이 생성되었습니다. 판매자와 채팅을 시작할 수 있습니다.';
        
        const reqBtn = document.getElementById('request-btn');
        if (reqBtn) reqBtn.style.display = 'none';

        await loadMessages();
        startPolling();
      } else {
        box.className = 'message error';
        box.textContent = data.message || '거래 요청에 실패했습니다.';
      }
    }

    async function loadMessages() {
      if (!currentTransactionId) return;
      const res = await fetch(`/api/transactions/${currentTransactionId}/messages`, { credentials: 'same-origin' });
      const data = await res.json().catch(() => ({ messages: [] }));
      const chatSection = document.getElementById('chat-section');
      const chatMessages = document.getElementById('chat-messages');
      chatSection.style.display = 'block';
      
      chatMessages.innerHTML = (data.messages || []).length
        ? data.messages.map(msg => {
            const isMine = msg.sender_id === currentUserId;
            const bubbleClass = isMine ? 'chat-bubble mine' : 'chat-bubble other';
            const timeStr = msg.created_at ? new Date(msg.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
            const senderLabel = isMine ? '나' : '상대방';

            return `
              <div class="${bubbleClass}">
                <div class="chat-meta">
                  <span>${escapeHtml(senderLabel)}</span>
                  <span>${timeStr}</span>
                </div>
                <div class="chat-text">${escapeHtml(msg.content)}</div>
              </div>
            `;
          }).join('')
        : '<p style="padding: 1rem; color: var(--text-secondary);">아직 주고받은 메시지가 없습니다.</p>';
      
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function startPolling() {
      if (pollInterval) clearInterval(pollInterval);
      pollInterval = setInterval(loadMessages, 3000);
    }

    document.getElementById('chat-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      if (!currentTransactionId) return;
      const content = document.getElementById('chat-content').value.trim();
      if (!content) return;
      const csrfToken = await getCsrfToken();
      const res = await fetch(`/api/transactions/${currentTransactionId}/messages`, {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 
          'Content-Type': 'application/json',
          'X-CSRFToken': csrfToken
        },
        body: JSON.stringify({ content })
      });
      if (res.ok) {
        document.getElementById('chat-content').value = '';
        await loadMessages();
      }
    });

    document.addEventListener('DOMContentLoaded', loadItem);
  </script>
</body>
</html>
