<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tiny Second-hand Shopping Platform</title>
  <style>body{font-family:Arial,sans-serif;max-width:900px;margin:2rem auto;padding:1rem;line-height:1.6}nav a{margin-right:1rem}</style>
</head>
<body>
  <h1>Tiny Second-hand Shopping Platform</h1>
  <p>이 페이지는 시연용으로 직접 서버를 띄워 확인할 수 있는 진입 페이지입니다.</p>
  <nav>
    <a href="/">홈</a>
    <a href="/login">로그인</a>
    <a href="/register">회원가입</a>
    <a href="/items">상품 목록</a>
  </nav>
  <h2>핵심 기능</h2>
  <ul>
    <li>회원가입 / 로그인</li>
    <li>상품 등록 및 목록 조회</li>
    <li>상품 상세 조회</li>
    <li>신고 생성</li>
    <li>채팅/거래 요청 API</li>
  </ul>
  <p>API 확인은 <code>/health</code> 및 <code>/api/auth/*</code>, <code>/api/items</code> 경로로 가능합니다.</p>
</body>
