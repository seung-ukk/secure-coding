<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tiny Second-hand Shopping Platform</title>
  <style>body{font-family:Arial,sans-serif;max-width:900px;margin:2rem auto;padding:1rem;line-height:1.6}nav a,nav button{margin-right:1rem}#user-area{margin:1rem 0;padding:0.75rem;border:1px solid #ddd;border-radius:6px}</style>
</head>
<body>
  <h1>Tiny Second-hand Shopping Platform</h1>
  <div id="user-area">{{user_area}}</div>
  <nav>
    <a href="/">홈</a>
    <a href="/items">상품 목록</a>
    <a href="/login" id="login-link">로그인</a>
    <a href="/register" id="register-link">회원가입</a>
  </nav>
  <h2>핵심 기능</h2>
  <ul>
    <li>회원가입 / 로그인</li>
    <li>상품 등록 및 목록 조회</li>
    <li>상품 상세 조회</li>
    <li>신고 생성</li>
    <li>채팅/거래 요청 API</li>
  </ul>
  <p><a href="/items" style="display:inline-block;padding:0.6rem 1rem;background:#2563eb;color:white;text-decoration:none;border-radius:6px">상품 조회</a></p>
  <p>API 확인은 <code>/health</code> 및 <code>/api/auth/*</code>, <code>/api/items</code> 경로로 가능합니다.</p>
  <script>
    async function loadAuthState() {
      const res = await fetch('/api/auth/status', { credentials: 'same-origin' });
      const data = await res.json().catch(() => ({}));
      const userArea = document.getElementById('user-area');
      const loginLink = document.getElementById('login-link');
      const registerLink = document.getElementById('register-link');

      if (data.authenticated) {
        userArea.innerHTML = `로그인됨: <strong>${data.user?.username || '사용자'}</strong> <button id="logout-btn" type="button">로그아웃</button>`;
        loginLink.style.display = 'none';
        registerLink.style.display = 'none';
        document.getElementById('logout-btn').addEventListener('click', async () => {
          await fetch('/api/auth/logout', { method: 'POST', credentials: 'same-origin' });
          window.location.reload();
        });
      } else {
        userArea.innerHTML = '아직 로그인하지 않았습니다.';
        loginLink.style.display = 'inline';
        registerLink.style.display = 'inline';
      }
    }

    loadAuthState();
  </script>
</body>
</html>
