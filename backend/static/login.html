<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>로그인</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav>
    <a href="/">홈</a>
    <a href="/items">상품 목록</a>
    <a href="/register">회원가입</a>
  </nav>
  <h2>로그인</h2>
  <div id="message"></div>
  <form id="login-form">
    <input id="identifier" name="identifier" placeholder="이메일 또는 아이디" required>
    <input id="password" name="password" type="password" placeholder="비밀번호" required>
    <button type="submit">로그인</button>
  </form>
  <p><a href="/register">회원가입 하기</a></p>
  <script>
    const form = document.getElementById('login-form');
    const message = document.getElementById('message');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const csrfRes = await fetch('/api/auth/csrf-token');
      const csrfData = await csrfRes.json().catch(() => ({}));
      const formData = new FormData(form);
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        body: formData,
        credentials: 'same-origin',
        headers: {
          'X-CSRFToken': csrfData.csrf_token || ''
        }
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        message.className = 'message success';
        message.textContent = '로그인에 성공했습니다. 메인 페이지로 이동합니다.';
        setTimeout(() => { window.location.href = '/'; }, 800);
      } else {
        message.className = 'message error';
        message.textContent = data.message || '로그인에 실패했습니다.';
      }
    });
  </script>
</body>
</html>
