<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>회원가입</title>
  <style>body{font-family:Arial,sans-serif;max-width:480px;margin:2rem auto;padding:1rem}input,button{display:block;width:100%;margin:0.5rem 0;padding:0.6rem}.message{margin:1rem 0;padding:0.75rem;border-radius:4px}.error{background:#ffeaea;color:#b00020}.success{background:#eaf7ea;color:#1b5e20}</style>
</head>
<body>
  <h2>회원가입</h2>
  <div id="message"></div>
  <form id="register-form">
    <input id="email" name="email" placeholder="이메일" required>
    <input id="username" name="username" placeholder="아이디" required>
    <input id="password" name="password" type="password" placeholder="비밀번호" required>
    <label><input name="agree_terms" type="checkbox" checked> 약관 동의</label>
    <button type="submit">가입하기</button>
  </form>
  <p><a href="/login">로그인 페이지로</a></p>
  <script>
    const form = document.getElementById('register-form');
    const message = document.getElementById('message');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const formData = new FormData(form);
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        body: formData,
        credentials: 'same-origin'
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        message.className = 'message success';
        message.textContent = '회원가입이 완료되었습니다. 로그인 페이지로 이동합니다.';
        setTimeout(() => { window.location.href = '/login'; }, 800);
      } else {
        message.className = 'message error';
        message.textContent = data.message || '회원가입에 실패했습니다.';
      }
    });
  </script>
</body>
</html>
