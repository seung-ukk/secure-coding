<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회원가입 - TinyMarket</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/app.js" defer></script>
</head>
<body>
  <header id="global-header"></header>
  <h2>회원가입</h2>
  <div id="message"></div>
  <form id="register-form">
    <input id="email" name="email" placeholder="이메일" required>
    <input id="username" name="username" placeholder="아이디" required>
    <input id="password" name="password" type="password" placeholder="비밀번호" required>
    <label><input name="agree_terms" type="checkbox" checked> 약관 동의</label>
    <button type="submit">가입하기</button>
  </form>
  <p><a href="/login">로그인 페이지로</a></p>
  <script>
    const form = document.getElementById('register-form');
    const message = document.getElementById('message');
    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      const csrfRes = await fetch('/api/auth/csrf-token');
      const csrfData = await csrfRes.json().catch(() => ({}));
      const formData = new FormData(form);
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        body: formData,
        credentials: 'same-origin',
        headers: {
          'X-CSRFToken': csrfData.csrf_token || ''
        }
      });
      const data = await res.json().catch(() => ({}));
      if (res.ok) {
        message.className = 'message success';
        message.textContent = '회원가입이 완료되었습니다. 로그인 페이지로 이동합니다.';
        setTimeout(() => { window.location.href = '/login'; }, 800);
      } else {
        message.className = 'message error';
        message.textContent = data.message || '회원가입에 실패했습니다.';
      }
    });
  </script>
</body>
</html>
