<!doctype html>
<html lang="ko">
<head><meta charset="utf-8"><title>회원가입</title><style>body{font-family:Arial,sans-serif;max-width:480px;margin:2rem auto;padding:1rem}input,button{display:block;width:100%;margin:0.5rem 0;padding:0.6rem}</style></head>
<body>
  <h2>회원가입</h2>
  <form action="/api/auth/register" method="post">
    <input name="email" placeholder="이메일" required>
    <input name="username" placeholder="아이디" required>
    <input name="password" type="password" placeholder="비밀번호" required>
    <input name="agree_terms" type="checkbox" checked> 약관 동의
    <button type="submit">가입하기</button>
  </form>
  <p><a href="/login">로그인 페이지로</a></p>
</body>
</html>
